<!DOCTYPE html>
<html>
<head>
    <title>AI Talent Scouting Agent</title>

    <style>
        body {
            font-family: 'Segoe UI', sans-serif;
            background: #eef2f7;
            padding: 40px;
        }

        .container {
            max-width: 1000px;
            margin: auto;
            background: white;
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.08);
        }

        h2 {
            margin-bottom: 20px;
            color: #333;
        }

        textarea {
            width: 100%;
            height: 120px;
            padding: 12px;
            border-radius: 8px;
            border: 1px solid #ccc;
            font-size: 14px;
        }

        button {
            margin-top: 15px;
            padding: 12px 25px;
            background: #4f46e5;
            color: white;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-size: 14px;
        }

        button:hover {
            background: #4338ca;
        }

        table {
            width: 100%;
            margin-top: 30px;
            border-collapse: collapse;
        }

        th {
            background: #111827;
            color: white;
            padding: 14px;
            text-align: left;
        }

        td {
            padding: 12px;
            border-bottom: 1px solid #eee;
        }

        tr:hover {
            background: #f9fafb;
        }

        .rank {
            font-weight: bold;
            color: #4f46e5;
        }

        .bar {
            height: 8px;
            background: #e5e7eb;
            border-radius: 5px;
            overflow: hidden;
        }

        .fill {
            height: 100%;
            background: linear-gradient(90deg, #4f46e5, #06b6d4);
        }

        .score {
            font-size: 12px;
            margin-top: 4px;
        }

        .empty {
            margin-top: 20px;
            color: #777;
        }
    </style>
</head>

<body>

<div class="container">

    <h2>AI Talent Scouting Agent</h2>

    <!-- ✅ FORM FIX -->
    <form onsubmit="processJD(event)">
        <textarea id="jd" placeholder="Paste Job Description here..."></textarea>
        <button type="submit">Analyze</button>
    </form>

    <div id="results"></div>

</div>

<script>

function createBar(value) {
    return `
        <div class="bar">
            <div class="fill" style="width:${value}%"></div>
        </div>
        <div class="score">${value}</div>
    `;
}

function processJD(event) {
    event.preventDefault(); // 🚨 prevents reload (important)

    let jd = document.getElementById("jd").value;

    if (!jd.trim()) {
        document.getElementById("results").innerHTML =
            "<div class='empty'>Please enter a Job Description.</div>";
        return;
    }

    fetch("/process", {
        method: "POST",
        headers: {
            "Content-Type": "application/x-www-form-urlencoded"
        },
        body: "jd=" + encodeURIComponent(jd)
    })
    .then(res => res.json())
    .then(data => {

        if (!data || data.length === 0) {
            document.getElementById("results").innerHTML =
                "<div class='empty'>No candidates found.</div>";
            return;
        }

        let html = `
        <table>
            <tr>
                <th>Rank</th>
                <th>Candidate</th>
                <th>Match Score</th>
                <th>Interest Score</th>
                <th>Final Score</th>
                <th>Skills</th>
            </tr>
        `;

        data.forEach((c, index) => {
            html += `
            <tr>
                <td class="rank">#${index + 1}</td>
                <td>${c.name}</td>
                <td>${createBar(c.match_score)}</td>
                <td>${createBar(c.interest_score)}</td>
                <td>${createBar(c.final_score)}</td>
                <td>${c.explanation.skills.length ? c.explanation.skills.join(", ") : "-"}</td>
            </tr>
            `;
        });

        html += "</table>";

        document.getElementById("results").innerHTML = html;
    })
    .catch(err => {
        document.getElementById("results").innerHTML =
            "<div class='empty'>Error processing request.</div>";
        console.error(err);
    });
}

</script>

</body>
</html>
